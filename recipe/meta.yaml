{% set version = "1.1.0" %}

package:
  name: devpi-process
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/devpi-process/devpi_process-{{ version }}.tar.gz
  sha256: 9bdb23f6cd8360337083033d861d8931bb2e0194331dfa355d2d3270b078f3a4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - hatch-vcs >=0.4
    - hatchling >=1.25
    - pip
    - python {{ python_min }}
  run:
    - devpi-client >=7.1
    - devpi-server >=6.12.1
    - python >={{ python_min }}
    - typing_extensions >=4.12.2

test:
  imports:
    - devpi_process
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/tox-dev/devpi-process
  summary: devpi process provides a programmatic API to create and use a devpi server process
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - bollwyvl
